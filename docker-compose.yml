services:
  app:
    container_name: anki-app
    image: ${APP_IMAGE:-anki-vocab-bot:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    expose:
      - "8000"
    volumes:
      - ./backend/data:/app/backend/data
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    networks:
      - default
      - edge

networks:
  edge:
    external: true
