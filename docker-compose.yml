services:
  app:
    image: ${APP_IMAGE:-anki-vocab-bot:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    expose:
      - "8000"
    volumes:
      - ./backend/data:/app/backend/data
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
