name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd /opt/anki-vocab-bot
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export APP_IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker compose pull app nginx
            docker compose up -d app nginx
            docker image prune -f

      - name: Set Telegram webhook
        run: |
          set -euo pipefail
          response=$(curl -sS --fail "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=${{ secrets.TELEGRAM_WEBHOOK_URL }}" \
            -d "secret_token=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}")
          echo "$response"
          echo "$response" | grep -q '"ok":true'

      - name: Verify Telegram webhook
        run: |
          set -euo pipefail
          info=$(curl -sS --fail "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo")
          echo "$info"
          echo "$info" | grep -q "\"url\":\"${{ secrets.TELEGRAM_WEBHOOK_URL }}\""
